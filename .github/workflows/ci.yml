name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install bats-core shellcheck

      - name: Run ShellCheck
        run: shellcheck -e SC2155,SC2129,SC2181,SC2029 smart-ssh

      - name: Run bats tests
        run: bats tests/test_smart_ssh.bats

      - name: Run make checksum
        run: make checksum
