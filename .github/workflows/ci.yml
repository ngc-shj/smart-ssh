name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats-core
        run: npm install -g bats

      - name: Install shellcheck
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            brew install shellcheck
          else
            sudo apt-get install -y shellcheck
          fi

      - name: Run ShellCheck
        run: shellcheck -e SC2155,SC2129,SC2181,SC2029 smart-ssh

      - name: Run bats tests
        run: bats tests/test_smart_ssh.bats

      - name: Run make checksum
        run: make checksum
